<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment 1b | User List</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #edf4f8;
      color: #1f2933;
      padding: 32px;
    }
    main {
      max-width: 920px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }
    h1 { margin-top: 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }
    a {
      display: inline-block;
      margin-top: 16px;
      color: #2563eb;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Registered Users</h1>
    <p>Data is submitted using AJAX POST and stored in localStorage for this practical.</p>
    <div id="output"></div>
    <a href="login.html">Add another user</a>
  </main>

  <script>
    const users = JSON.parse(localStorage.getItem("users") || "[]");
    const output = document.getElementById("output");

    if (users.length === 0) {
      output.innerHTML = "<p>No registration data found.</p>";
    } else {
      output.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Mobile</th>
              <th>City</th>
              <th>Hobbies</th>
            </tr>
          </thead>
          <tbody>
            ${users.map((user) => `
              <tr>
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.mobile}</td>
                <td>${user.city}</td>
                <td>${user.hobbies.join(", ")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
